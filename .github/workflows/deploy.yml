name: Hexo Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install -g hexo-cli
          npm install

      - name: Deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "1TRhez"
          git config --global user.email "saa.1trhez@gmail.com"
          # 直接利用内置 Token 推送，不走 SSH
          sed -i "s|github.com/1TRhez/1TRhez.github.io.git|x-access-token:${GITHUB_TOKEN}@github.com/1TRhez/1TRhez.github.io.git|g" _config.yml
          hexo clean
          hexo generate
          hexo deploy